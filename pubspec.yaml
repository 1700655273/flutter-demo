name: flutter_demo
description: Flutter 主流框架 Demo - Clean Architecture + Riverpod + GoRouter + Dio

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod
  flutter_riverpod: ^2.5.1

  # 路由管理 - GoRouter
  go_router: ^14.2.0

  # 网络请求 - Dio
  dio: ^5.4.3

  # 网络日志 - 控制台美化
  pretty_dio_logger: ^1.4.0

  # 本地存储
  shared_preferences: ^2.3.4

  # JSON序列化
  json_annotation: ^4.9.0

  # 远程日志 - Sentry
  sentry_flutter: ^8.0.0
  sentry_dio: ^8.0.0

  # 国际化
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
